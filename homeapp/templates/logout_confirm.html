<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Out - NovaLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #49568f 0%, #2c4659 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logout-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            position: relative;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            font-size: 40px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }

        .logo i {
            margin-right: 10px;
        }

        /* Logout Icon Animation */
        .logout-icon {
            font-size: 60px;
            color: #667eea;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Title */
        h2 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Loading Spinner */
        .loader {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
        }

        .loader-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .loader-circle:nth-child(2) {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-top-color: #4b71a2;
            animation: spin 2s linear infinite reverse;
        }

        .loader-circle:nth-child(3) {
            width: 40%;
            height: 40%;
            top: 30%;
            left: 30%;
            border-top-color: #f6c23e;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            animation: progress 2s ease-in-out forwards;
            transform-origin: left;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Dots Animation */
        .dots {
            display: inline-block;
        }

        .dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 3px;
            animation: dots 1.4s infinite ease-in-out both;
        }

        .dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes dots {
            0%, 80%, 100% { 
                transform: scale(0);
            } 
            40% { 
                transform: scale(1);
            }
        }

        /* Message */
        .message {
            margin-top: 20px;
            color: #333;
            font-weight: 500;
        }

        .sub-message {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Particles Background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particle 10s linear infinite;
        }

        @keyframes particle {
            0% {
                transform: translateY(-100%) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(1000%) rotate(720deg);
                opacity: 0;
            }
        }

        /* Success Check Animation */
        .success-check {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
        }

        .success-check .check {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pop 0.5s ease-out forwards;
            opacity: 0;
        }

        .success-check .check i {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 30px;
        }

        @keyframes pop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* Pulse Animation */
        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }
    </style>
</head>
<body>
    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <div class="logout-container" id="logoutContainer">
        <!-- Logo -->
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> NovaLearn
        </div>

        <!-- Logout Icon -->
        <div class="logout-icon" id="logoutIcon">
            <i class="fas fa-sign-out-alt"></i>
        </div>

        <!-- Loading Spinner (shown during logout) -->
        <div class="loader" id="loader">
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
        </div>

        <!-- Success Check (shown after logout) -->
        <div class="success-check" id="successCheck" style="display: none;">
            <div class="check pulse">
                <i class="fas fa-check"></i>
            </div>
        </div>

        <!-- Message -->
        <h2 id="mainMessage">Logging Out</h2>
        <p id="subMessage">Please wait while we securely log you out...</p>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Dots Animation -->
        <div class="dots" id="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Status Message -->
        <div class="message" id="statusMessage">
            Clearing session data...
        </div>
        <div class="sub-message" id="subStatusMessage">
            This will only take a moment
        </div>
    </div>

    <script>
        // Create particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random position
                particle.style.left = Math.random() * 100 + '%';
                
                // Random animation delay
                particle.style.animationDelay = Math.random() * 10 + 's';
                
                // Random size
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                // Random opacity
                particle.style.opacity = Math.random() * 0.5 + 0.3;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Simulate logout process with stages
        function simulateLogout() {
            const stages = [
                { message: 'Clearing session data...', subMessage: 'Removing temporary data', progress: 25 },
                { message: 'Closing active connections...', subMessage: 'Ensuring secure logout', progress: 50 },
                { message: 'Clearing cookies...', subMessage: 'Removing browser storage', progress: 75 },
                { message: 'Finalizing logout...', subMessage: 'Almost there', progress: 90 },
                { message: 'Redirecting to login...', subMessage: 'Thank you for using NovaLearn', progress: 100 }
            ];

            let currentStage = 0;
            const mainMessage = document.getElementById('mainMessage');
            const subMessage = document.getElementById('subMessage');
            const statusMessage = document.getElementById('statusMessage');
            const subStatusMessage = document.getElementById('subStatusMessage');
            const progressBar = document.getElementById('progressBar');
            const loader = document.getElementById('loader');
            const successCheck = document.getElementById('successCheck');
            const logoutIcon = document.getElementById('logoutIcon');
            const dots = document.getElementById('dots');

            const interval = setInterval(() => {
                if (currentStage < stages.length) {
                    const stage = stages[currentStage];
                    
                    // Update messages
                    mainMessage.textContent = 'Logging Out';
                    subMessage.textContent = stage.subMessage;
                    statusMessage.textContent = stage.message;
                    subStatusMessage.textContent = stage.subMessage;
                    
                    // Update progress bar
                    progressBar.style.width = stage.progress + '%';
                    
                    currentStage++;

                    // If last stage, show success and redirect
                    if (currentStage === stages.length) {
                        clearInterval(interval);
                        
                        // Hide loader, show success
                        loader.style.display = 'none';
                        successCheck.style.display = 'block';
                        logoutIcon.style.display = 'none';
                        dots.style.display = 'none';
                        
                        // Update final messages
                        mainMessage.textContent = 'Logged Out Successfully!';
                        subMessage.textContent = 'Redirecting to home page...';
                        statusMessage.textContent = 'See you soon!';
                        subStatusMessage.textContent = 'You will be redirected automatically';
                        
                        // Add pulse animation to container
                        document.getElementById('logoutContainer').classList.add('pulse');
                        
                        // Redirect to login after showing success
                        setTimeout(() => {
                            window.location.href = "{% url 'index' %}";
                        }, 1500);
                    }
                }
            }, 800); // Change stage every 800ms
        }

        // Initialize particles and start logout simulation
        window.onload = function() {
            createParticles();
            simulateLogout();
        };
    </script>
</body>
</html>
